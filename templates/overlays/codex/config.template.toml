# Codex CLI project configuration generated by Omni-Coder Kit.
# Project-scoped .codex/config.toml is loaded only after the project is trusted.
# Docs: https://developers.openai.com/codex/config-reference

# Keep AGENTS.md compact. Omni stores long workflow instructions in .omni/workflows/.
project_doc_max_bytes = 32768

# Safer default for interactive local work.
sandbox_mode = "workspace-write"
approval_policy = "on-request"

[sandbox_workspace_write]
network_access = false

[features]
# Required for .codex/hooks.json to run.
codex_hooks = true

[profiles.omni_safe]
sandbox_mode = "workspace-write"
approval_policy = "on-request"
model_reasoning_effort = "medium"
model_verbosity = "medium"

[profiles.omni_full_auto]
# Lower-friction mode. Use only in repositories and sandboxes you trust.
sandbox_mode = "workspace-write"
approval_policy = "never"
model_reasoning_effort = "medium"
model_verbosity = "medium"

[profiles.omni_review]
sandbox_mode = "read-only"
approval_policy = "untrusted"
model_reasoning_effort = "high"
model_verbosity = "medium"
